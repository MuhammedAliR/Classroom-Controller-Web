<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classroom Controller - Veyon-Style</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="styles.css?v=10" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js" 
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
  <!-- Login Modal -->
  <div id="login-modal" class="modal">
    <div class="modal-content">
      <h2>Classroom Controller</h2>
      <p>Enter Master Key to continue</p>
      <input type="password" id="master-key-input" placeholder="Master Key" autocomplete="off" />
      <button id="login-submit">Unlock</button>
    </div>
  </div>

  <!-- Main Application -->
  <div id="app-shell" class="hidden">
    <div class="main-content">
      <h1>Classroom Controller</h1>
      <div id="devices-grid" class="devices-grid"></div>
    </div>
  </div>

  <div id="web-filter-panel" class="side-panel">
    <div class="side-panel-header">
      <div>
        <p class="side-panel-eyebrow">Web Filter</p>
        <h2 id="filter-device-name">Select a student</h2>
        <p id="filter-device-mac" class="side-panel-subtitle">Choose a device card to manage website blocking.</p>
      </div>
      <button id="web-filter-close-btn" class="side-panel-close-btn" type="button" aria-label="Close web filter panel">X</button>
    </div>

    <div class="filter-site-list">
      <label class="filter-site-item">
        <div class="filter-site-meta">
          <span class="site-logo">YT</span>
          <div>
            <div class="filter-site-name">YouTube</div>
            <div class="filter-site-domain">youtube.com</div>
          </div>
        </div>
        <span class="toggle-switch">
          <input class="web-filter-toggle" type="checkbox" data-domain="youtube.com" />
          <span class="toggle-slider"></span>
        </span>
      </label>

      <label class="filter-site-item">
        <div class="filter-site-meta">
          <span class="site-logo">IG</span>
          <div>
            <div class="filter-site-name">Instagram</div>
            <div class="filter-site-domain">instagram.com</div>
          </div>
        </div>
        <span class="toggle-switch">
          <input class="web-filter-toggle" type="checkbox" data-domain="instagram.com" />
          <span class="toggle-slider"></span>
        </span>
      </label>

      <label class="filter-site-item">
        <div class="filter-site-meta">
          <span class="site-logo">TT</span>
          <div>
            <div class="filter-site-name">TikTok</div>
            <div class="filter-site-domain">tiktok.com</div>
          </div>
        </div>
        <span class="toggle-switch">
          <input class="web-filter-toggle" type="checkbox" data-domain="tiktok.com" />
          <span class="toggle-slider"></span>
        </span>
      </label>

      <label class="filter-site-item">
        <div class="filter-site-meta">
          <span class="site-logo">DC</span>
          <div>
            <div class="filter-site-name">Discord</div>
            <div class="filter-site-domain">discord.com</div>
          </div>
        </div>
        <span class="toggle-switch">
          <input class="web-filter-toggle" type="checkbox" data-domain="discord.com" />
          <span class="toggle-slider"></span>
        </span>
      </label>
    </div>
  </div>

  <div id="rc-modal" class="hidden">
    <div class="rc-panel">
      <canvas id="rc-canvas" width="1280" height="720"></canvas>
      <button id="rc-close-btn" type="button">Close Remote Control</button>
    </div>
  </div>

  <script src="app.js?v=13"></script>
</body>
</html>
